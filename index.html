<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Estudio · UAI 2026/1</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0d0d0f;
  --surface: #141416;
  --surface2: #1c1c1f;
  --surface3: #242428;
  --border: #2a2a2e;
  --border2: #333338;
  --text: #e8e6e0;
  --text2: #9a9890;
  --text3: #555450;
  --accent: #e8c97a;
  --accent2: #c0392b;
  --green: #4ade80;
  --blue: #60a5fa;
  --purple: #a78bfa;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  display: flex;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  height: 100vh;
  position: sticky;
  top: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-top {
  padding: 1.5rem 1.4rem 1rem;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.25rem;
  color: var(--text);
  margin-bottom: 0.2rem;
}

.logo-sub {
  font-family: 'Geist Mono', monospace;
  font-size: 0.6rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.search-wrap {
  padding: 0.8rem 1.4rem;
  border-bottom: 1px solid var(--border);
}

.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 0.4rem;
  padding: 0.5rem 0.8rem;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.8rem;
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--border2); }
.search-input::placeholder { color: var(--text3); }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 0.8rem 0;
}

.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.nav-section-label {
  font-family: 'Geist Mono', monospace;
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text3);
  padding: 0.4rem 1.4rem;
  margin-bottom: 0.2rem;
}

/* Materia en sidebar */
.materia-tree { margin-bottom: 0.2rem; }

.materia-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.55rem 1.4rem;
  cursor: pointer;
  transition: background 0.12s;
  border-radius: 0;
}
.materia-row:hover { background: var(--surface2); }
.materia-row.active { background: var(--surface3); }

.materia-color-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.materia-row-name {
  font-size: 0.82rem;
  color: var(--text2);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.materia-row.active .materia-row-name { color: var(--text); }

.materia-row-chevron {
  font-size: 0.6rem;
  color: var(--text3);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.materia-row-chevron.open { transform: rotate(90deg); }

/* Carpetas dentro de materia */
.carpeta-tree { display: none; }
.carpeta-tree.open { display: block; }

.carpeta-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.4rem 1.4rem 0.4rem 2.8rem;
  cursor: pointer;
  transition: background 0.12s;
  font-size: 0.78rem;
  color: var(--text3);
}
.carpeta-row:hover { background: var(--surface2); color: var(--text2); }
.carpeta-row.active { background: rgba(232,201,122,0.06); color: var(--accent); }
.carpeta-row .folder-icon { font-size: 0.75rem; }

/* File count badge */
.file-badge {
  margin-left: auto;
  font-family: 'Geist Mono', monospace;
  font-size: 0.58rem;
  background: var(--surface3);
  padding: 0.1rem 0.4rem;
  border-radius: 2rem;
  color: var(--text3);
}
.carpeta-row.active .file-badge { background: rgba(232,201,122,0.12); color: var(--accent); }

.sidebar-footer {
  padding: 0.8rem 1.4rem;
  border-top: 1px solid var(--border);
  font-family: 'Geist Mono', monospace;
  font-size: 0.6rem;
  color: var(--text3);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.storage-bar-wrap { margin-top: 0.3rem; }
.storage-bar { height: 2px; background: var(--border2); border-radius: 1px; overflow: hidden; }
.storage-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 0.4s; }

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  height: 100vh;
  overflow-y: auto;
}

/* TOPBAR */
.topbar {
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 10;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-family: 'Geist Mono', monospace;
  font-size: 0.72rem;
  color: var(--text3);
}

.breadcrumb span { color: var(--text2); }
.breadcrumb .sep { color: var(--text3); }
.breadcrumb .current { color: var(--text); }

.topbar-actions { display: flex; gap: 0.6rem; align-items: center; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 1rem;
  border-radius: 0.35rem;
  font-family: 'Geist Mono', monospace;
  font-size: 0.68rem;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  letter-spacing: 0.04em;
}

.btn-primary { background: var(--accent); color: #0d0d0f; }
.btn-primary:hover { background: #f0d48a; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.btn-danger { background: transparent; color: var(--accent2); border: 1px solid rgba(192,57,43,0.3); }
.btn-danger:hover { background: rgba(192,57,43,0.1); }

/* ── CONTENT ── */
.content {
  flex: 1;
  padding: 2rem;
}

/* HOME VIEW */
.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}

.materia-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0.6rem;
  padding: 1.4rem;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}

.materia-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 0.6rem 0.6rem 0 0;
}

.materia-card:hover {
  border-color: var(--border2);
  background: var(--surface2);
  transform: translateY(-2px);
}

.mc-sigla {
  font-family: 'Geist Mono', monospace;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin-bottom: 0.5rem;
}

.mc-nombre {
  font-family: 'Instrument Serif', serif;
  font-size: 1rem;
  line-height: 1.2;
  color: var(--text);
  margin-bottom: 0.8rem;
}

.mc-stats {
  display: flex;
  gap: 0.8rem;
  font-family: 'Geist Mono', monospace;
  font-size: 0.6rem;
  color: var(--text3);
}

.mc-stats span { display: flex; align-items: center; gap: 0.3rem; }

/* MATERIA VIEW */
.section-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 0.3rem;
}

.section-sub {
  font-family: 'Geist Mono', monospace;
  font-size: 0.65rem;
  color: var(--text3);
  margin-bottom: 1.5rem;
}

.carpetas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.8rem;
  margin-bottom: 2rem;
}

.carpeta-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0.5rem;
  padding: 1.1rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.carpeta-card:hover {
  border-color: var(--border2);
  background: var(--surface2);
}

.carpeta-card.active-card {
  border-color: var(--accent);
  background: rgba(232,201,122,0.04);
}

.cc-icon { font-size: 1.4rem; }
.cc-name { font-size: 0.82rem; font-weight: 600; color: var(--text); }
.cc-count { font-family: 'Geist Mono', monospace; font-size: 0.62rem; color: var(--text3); }

/* ADD CARPETA */
.add-carpeta-card {
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: 0.5rem;
  padding: 1.1rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  min-height: 90px;
  color: var(--text3);
  font-size: 0.78rem;
}
.add-carpeta-card:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,201,122,0.03); }

/* ARCHIVOS VIEW */
.archivos-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.2rem;
}

.drop-zone {
  border: 2px dashed var(--border2);
  border-radius: 0.6rem;
  padding: 2.5rem;
  text-align: center;
  transition: all 0.2s;
  cursor: pointer;
  margin-bottom: 1.5rem;
  background: var(--surface);
}

.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent);
  background: rgba(232,201,122,0.04);
}

.drop-icon { font-size: 2rem; margin-bottom: 0.8rem; }
.drop-title { font-size: 0.9rem; color: var(--text2); margin-bottom: 0.3rem; }
.drop-sub { font-family: 'Geist Mono', monospace; font-size: 0.65rem; color: var(--text3); }
.drop-zone input[type="file"] { display: none; }

/* FILE LIST */
.file-list { display: flex; flex-direction: column; gap: 0.5rem; }

.file-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0.45rem;
  padding: 0.9rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.9rem;
  transition: border-color 0.15s;
  animation: slideIn 0.2s ease both;
}

.file-item:hover { border-color: var(--border2); }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

.file-icon-wrap {
  width: 38px; height: 38px;
  border-radius: 0.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.file-info { flex: 1; min-width: 0; }
.file-name {
  font-size: 0.85rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 0.2rem;
}
.file-meta {
  font-family: 'Geist Mono', monospace;
  font-size: 0.6rem;
  color: var(--text3);
  display: flex;
  gap: 0.8rem;
}

.file-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

.icon-btn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 0.3rem;
  padding: 0.35rem 0.5rem;
  cursor: pointer;
  font-size: 0.75rem;
  color: var(--text3);
  transition: all 0.12s;
  font-family: 'Geist Mono', monospace;
}
.icon-btn:hover { background: var(--surface2); border-color: var(--border2); color: var(--text2); }
.icon-btn.del:hover { background: rgba(192,57,43,0.1); border-color: rgba(192,57,43,0.3); color: var(--accent2); }

/* NOTA INLINE */
.nota-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-family: 'Geist Mono', monospace;
  font-size: 0.62rem;
  padding: 0.15rem 0.5rem;
  border-radius: 2rem;
  border: 1px solid var(--border2);
  color: var(--text3);
  cursor: pointer;
  transition: all 0.12s;
}
.nota-chip:hover { border-color: var(--accent); color: var(--accent); }
.nota-chip.has-note { border-color: rgba(74,222,128,0.3); color: var(--green); background: rgba(74,222,128,0.05); }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 0.75rem;
  padding: 1.8rem;
  width: 100%;
  max-width: 420px;
  transform: translateY(10px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.15rem;
  margin-bottom: 1.2rem;
}

.form-group { margin-bottom: 1rem; }
.form-label {
  font-family: 'Geist Mono', monospace;
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin-bottom: 0.4rem;
  display: block;
}

.form-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 0.4rem;
  padding: 0.6rem 0.8rem;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--accent); }

.modal-actions { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1.4rem; }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text3);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
.empty-text { font-size: 0.85rem; margin-bottom: 0.3rem; color: var(--text2); }
.empty-sub { font-family: 'Geist Mono', monospace; font-size: 0.65rem; }

/* NOTA MODAL textarea */
textarea.form-input { min-height: 70px; resize: vertical; }

/* SAVE INDICATOR */
.save-ind {
  font-family: 'Geist Mono', monospace;
  font-size: 0.62rem;
  color: var(--green);
  opacity: 0;
  transition: opacity 0.3s;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

/* FILE TYPE COLORS */
.ft-pdf { background: rgba(192,57,43,0.15); }
.ft-img { background: rgba(96,165,250,0.15); }
.ft-doc { background: rgba(74,222,128,0.15); }
.ft-ppt { background: rgba(251,146,60,0.15); }
.ft-xls { background: rgba(74,222,128,0.15); }
.ft-other { background: var(--surface3); }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.view { animation: fadeIn 0.25s ease; }

/* PREVIEW */
.preview-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 200;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.preview-overlay.open { opacity: 1; pointer-events: all; }
.preview-bar {
  padding: 0.8rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
}
.preview-title { font-size: 0.85rem; color: var(--text2); }
.preview-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; overflow: auto; }
.preview-body iframe { width: 100%; height: 100%; border: none; border-radius: 0.4rem; }
.preview-body img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 0.4rem; }

@media (max-width: 700px) {
  .sidebar { display: none; }
}

/* ── TIMER WIDGET ── */
.timer-widget {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 50;
  width: 300px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 0.9rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.timer-widget.minimized {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  cursor: pointer;
  overflow: hidden;
}
.timer-widget.minimized .timer-body { display: none; }
.timer-widget.minimized .timer-header { padding: 0; height: 52px; border: none; background: var(--surface3); justify-content: center; }
.timer-widget.minimized .timer-header-title,
.timer-widget.minimized .timer-header-actions { display: none; }
.timer-widget.minimized .timer-mini-icon { display: flex !important; }

.timer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface3);
  cursor: default;
}
.timer-header-title {
  font-family: 'Geist Mono', monospace;
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.timer-header-actions { display: flex; gap: 0.3rem; }
.timer-mini-icon {
  display: none !important;
  font-size: 1.2rem;
  align-items: center;
  justify-content: center;
}
.timer-hbtn {
  background: transparent;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 0.75rem;
  padding: 0.2rem 0.4rem;
  border-radius: 0.25rem;
  transition: all 0.12s;
  font-family: 'Geist Mono', monospace;
}
.timer-hbtn:hover { background: var(--surface2); color: var(--text2); }

.timer-body { padding: 1rem; }

/* Mode tabs */
.timer-tabs {
  display: flex;
  gap: 0.3rem;
  margin-bottom: 1rem;
  background: var(--surface);
  border-radius: 0.4rem;
  padding: 0.2rem;
}
.timer-tab {
  flex: 1;
  padding: 0.35rem 0.2rem;
  border: none;
  background: transparent;
  color: var(--text3);
  font-family: 'Geist Mono', monospace;
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  border-radius: 0.3rem;
  transition: all 0.15s;
}
.timer-tab.active {
  background: var(--surface3);
  color: var(--accent);
}

/* Clock display */
.timer-clock {
  text-align: center;
  margin: 0.5rem 0 1rem;
  position: relative;
}
.timer-digits {
  font-family: 'Geist Mono', monospace;
  font-size: 3.2rem;
  font-weight: 300;
  color: var(--text);
  letter-spacing: 0.04em;
  line-height: 1;
  transition: color 0.3s;
}
.timer-digits.running { color: var(--accent); }
.timer-digits.break { color: var(--green); }
.timer-digits.warning { color: #f87171; }
.timer-label {
  font-family: 'Geist Mono', monospace;
  font-size: 0.58rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 0.3rem;
}

/* Progress ring */
.timer-ring-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 0.5rem;
  position: relative;
}
.timer-ring-wrap svg { transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: var(--border2); stroke-width: 3; }
.timer-ring-fill { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }

/* Manual time input */
.timer-manual-inputs {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 0.8rem;
  align-items: center;
  justify-content: center;
}
.timer-manual-inputs input {
  width: 52px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 0.35rem;
  padding: 0.35rem 0.4rem;
  color: var(--text);
  font-family: 'Geist Mono', monospace;
  font-size: 0.85rem;
  text-align: center;
  outline: none;
  transition: border-color 0.15s;
}
.timer-manual-inputs input:focus { border-color: var(--accent); }

// ══════════════════════════════════════════════════

let state = {

// ══════════════════════════════════════════════════
// PERSISTENCIA (todo en Supabase + localStorage como cache)
// ══════════════════════════════════════════════════
async function save() {
  try {
    const toSave = { materias: state.materias, archivos: state.archivos };
    const json = JSON.stringify(toSave);
    // Save to localStorage as cache
    localStorage.setItem(META_KEY, json);
    // Save to Supabase storage as metadata file
    const blob = new Blob([json], { type: 'application/json' });
    await _sb.storage.from(BUCKET).upload('_meta/state.json', blob, {
      upsert: true, cacheControl: '0'
    });
    showSave();
    updateStorage();
  } catch(e) {
    console.warn('Error guardando:', e);
  }
}

async function load() {
  try {
    // Try Supabase first (cloud)
    const { data, error } = await _sb.storage.from(BUCKET).download('_meta/state.json');
    if (data && !error) {
      const text = await data.text();
      const saved = JSON.parse(text);
      applyState(saved);
      localStorage.setItem(META_KEY, text); // update cache
      return;
    }
  } catch(e) {}

  // Fallback to localStorage cache
  try {
    const raw = localStorage.getItem(META_KEY);
    if (!raw) return;
    applyState(JSON.parse(raw));
  } catch(e) { console.warn('Error cargando datos:', e); }
}

function applyState(saved) {
  if (saved.materias) {
    saved.materias.forEach(sm => {
      const base = state.materias.find(m => m.id === sm.id);
      if (base) {
        sm.carpetas.forEach(sc => {
          if (!base.carpetas.find(bc => bc.id === sc.id)) base.carpetas.push(sc);
        });
      }
    });
  }
  if (saved.archivos) state.archivos = saved.archivos;
}


function showSave() {
  const el = document.getElementById('save-ind');
  if (!el) return;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', 2000);
}

function updateStorage() {
  try {
    let totalFiles = 0;
    for (const mId in state.archivos)
      for (const cId in state.archivos[mId])
        totalFiles += state.archivos[mId][cId].length;
    document.getElementById('storage-label').textContent = `${totalFiles} archivo${totalFiles !== 1 ? 's' : ''} en nube`;
    document.getElementById('storage-fill').style.width = Math.min(100, totalFiles * 2) + '%';
    document.getElementById('storage-fill').style.background = 'var(--accent)';
  } catch(e) {}
}

  const m = getMateria(mId);
  return m ? m.carpetas.find(c => c.id === cId) : null;
}

function getArchivos(mId, cId) {
  return state.archivos[mId]?.[cId] || [];
}

function countArchivos(mId) {
  const m = state.archivos[mId];
  if (!m) return 0;
  return Object.values(m).reduce((a, arr) => a + arr.length, 0);
}

function countArchivosCarpeta(mId, cId) {
  return getArchivos(mId, cId).length;
}

function fileIcon(type) {
  if (!type) return { icon: '📄', cls: 'ft-other' };
  if (type.includes('pdf')) return { icon: '📕', cls: 'ft-pdf' };
  if (type.includes('image')) return { icon: '🖼️', cls: 'ft-img' };
  if (type.includes('word') || type.includes('document')) return { icon: '📘', cls: 'ft-doc' };
  if (type.includes('presentation') || type.includes('powerpoint')) return { icon: '📙', cls: 'ft-ppt' };
  if (type.includes('sheet') || type.includes('excel')) return { icon: '📗', cls: 'ft-xls' };
  if (type.includes('text')) return { icon: '📄', cls: 'ft-other' };
  return { icon: '📄', cls: 'ft-other' };
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(0) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

// ══════════════════════════════════════════════════
// UPLOAD
// ══════════════════════════════════════════════════
function triggerUpload() {
  document.getElementById('file-input').click();
}

function dragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone')?.classList.add('drag-over');
}
function dragLeave(e) {
  document.getElementById('drop-zone')?.classList.remove('drag-over');
}
function dropFiles(e) {
  e.preventDefault();
  document.getElementById('drop-zone')?.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
}

function handleFiles(files) {
  if (!files || !files.length) return;
  if (currentView !== 'carpeta') return;

  Array.from(files).forEach(async file => {
    const id = genId();
    const path = `${currentMateriaId}/${currentCarpetaId}/${id}_${file.name}`;

    // Show uploading indicator
    showUploadProgress(file.name);

    const { data, error } = await _sb.storage.from(BUCKET).upload(path, file, {
      cacheControl: '3600',
      upsert: false
    });

    if (error) {
      hideUploadProgress();
      alert(`⚠️ Error subiendo "${file.name}": ${error.message}`);
      return;
    }

    // Get public URL
    const { data: urlData } = _sb.storage.from(BUCKET).getPublicUrl(path);
    const publicUrl = urlData.publicUrl;

    const entry = {
      id,
      name: file.name,
      type: file.type,
      size: file.size,
      url: publicUrl,
      path,
      nota: '',
      fecha: new Date().toLocaleDateString('es-CL', { day:'numeric', month:'short', year:'numeric' })
    };

    if (!state.archivos[currentMateriaId]) state.archivos[currentMateriaId] = {};
    if (!state.archivos[currentMateriaId][currentCarpetaId]) state.archivos[currentMateriaId][currentCarpetaId] = [];
    state.archivos[currentMateriaId][currentCarpetaId].push(entry);

    hideUploadProgress();
    save();
    renderCarpetaView();
    renderSidebar();
  });

  document.getElementById('file-input').value = '';
}

function showUploadProgress(name) {
  const existing = document.getElementById('upload-toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'upload-toast';
  toast.style.cssText = `position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border2);border-radius:0.5rem;padding:0.7rem 1.2rem;font-family:'Geist Mono',monospace;font-size:0.7rem;color:var(--accent);z-index:999;display:flex;align-items:center;gap:0.6rem;box-shadow:0 4px 20px rgba(0,0,0,0.4)`;
  toast.innerHTML = `<span style="animation:pulse 1s infinite;display:inline-block">☁️</span> Subiendo ${name}...`;
  document.body.appendChild(toast);
}

function hideUploadProgress() {
  document.getElementById('upload-toast')?.remove();
}


// ══════════════════════════════════════════════════
// ACCIONES ARCHIVOS
// ══════════════════════════════════════════════════
async function deleteFile(fileId) {
  if (!confirm('¿Eliminar este archivo?')) return;
  const arr = state.archivos[currentMateriaId]?.[currentCarpetaId];
  if (!arr) return;
  const idx = arr.findIndex(f => f.id === fileId);
  if (idx === -1) return;
  const f = arr[idx];

  // Delete from Supabase
  if (f.path) {
    await _sb.storage.from(BUCKET).remove([f.path]);
  }

  arr.splice(idx, 1);
  save();
  renderCarpetaView();
  renderSidebar();
}

function downloadFile(fileId) {
  const f = getArchivoById(fileId);
  if (!f) return;
  const a = document.createElement('a');
  a.href = f.url || f.data || '';
  a.download = f.name;
  a.target = '_blank';
  a.click();
}

function getArchivoById(id) {
  if (currentMateriaId && currentCarpetaId) {
    return state.archivos[currentMateriaId]?.[currentCarpetaId]?.find(f => f.id === id) || null;
  }
  // Buscar en todos
  for (const mId in state.archivos) {
    for (const cId in state.archivos[mId]) {
      const f = state.archivos[mId][cId].find(f => f.id === id);
      if (f) return f;
    }
  }
  return null;
}

// ══════════════════════════════════════════════════
// BÚSQUEDA
// ══════════════════════════════════════════════════
function buscarArchivos(query) {
  if (!query.trim()) {
    searchMode = false;
    // Volver a vista actual
    if (currentView === 'home') renderHome();
    else if (currentView === 'materia') renderMateriaView();
    else if (currentView === 'carpeta') renderCarpetaView();
    return;
  }

  searchMode = true;
  const q = query.toLowerCase();
  const results = [];

  state.materias.forEach(m => {
    m.carpetas.forEach(c => {
      const archivos = getArchivos(m.id, c.id);
      archivos.forEach(f => {
        if (f.name.toLowerCase().includes(q) || (f.nota && f.nota.toLowerCase().includes(q))) {
          results.push({ file: f, materia: m, carpeta: c });
        }
      });
    });
  });

  const content = document.getElementById('content');
  if (!results.length) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Sin resultados para "${query}"</div></div>`;
    return;
  }

  const filesHTML = results.map(r => {
    const fi = fileIcon(r.file.type);
    return `
      <div class="file-item" style="cursor:pointer" onclick="openCarpeta('${r.materia.id}','${r.carpeta.id}')">
        <div class="file-icon-wrap ${fi.cls}">${fi.icon}</div>
        <div class="file-info">
          <div class="file-name">${r.file.name}</div>
          <div class="file-meta">
            <span style="color:${r.materia.color}">${r.materia.sigla}</span>
            <span>${r.carpeta.emoji} ${r.carpeta.nombre}</span>
            <span>${formatSize(r.file.size)}</span>
          </div>
        </div>
        <div class="file-actions">
          <button class="icon-btn" onclick="event.stopPropagation();previewFile_search('${r.file.id}','${r.materia.id}','${r.carpeta.id}')">👁</button>
          <button class="icon-btn" onclick="event.stopPropagation();downloadFile_search('${r.file.id}','${r.materia.id}','${r.carpeta.id}')">↓</button>
        </div>
      </div>`;
  }).join('');

  content.innerHTML = `
    <div class="view">
      <div style="font-family:'Instrument Serif',serif;font-size:1.2rem;margin-bottom:0.3rem">Resultados de búsqueda</div>
      <div style="font-family:'Geist Mono',monospace;font-size:0.62rem;color:var(--text3);margin-bottom:1.5rem">${results.length} resultado${results.length!==1?'s':''} para "${query}"</div>
      <div class="file-list">${filesHTML}</div>
    </div>`;
}

function previewFile_search(fId, mId, cId) {
  const f = state.archivos[mId]?.[cId]?.find(f => f.id === fId);
  if (!f) return;
  previewFileRef = f;
  document.getElementById('preview-title').textContent = f.name;
  const body = document.getElementById('preview-body');
  body.innerHTML = '';
  if (f.type.includes('pdf')) {
    body.innerHTML = `<iframe src="${f.url || f.data}"></iframe>`;
  } else if (f.type.includes('image')) {
    body.innerHTML = `<img src="${f.url || f.data}" alt="${f.name}">`;
  } else {
    body.innerHTML = `<div style="text-align:center;color:var(--text3)"><div style="font-size:3rem;margin-bottom:1rem">${fileIcon(f.type).icon}</div><div style="color:var(--text2)">${f.name}</div></div>`;
  }

}

function downloadFile_search(fId, mId, cId) {

}

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function makeNoiseBuffer(ctx, type) {
  const bufSize = ctx.sampleRate * 2;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  if (type === 'white') {
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  } else if (type === 'brown') {
    let last = 0;
    for (let i = 0; i < bufSize; i++) {
      const w = Math.random() * 2 - 1;
      data[i] = (last + 0.02 * w) / 1.02;
      last = data[i];
      data[i] *= 3.5;
    }
  } else { // pink / rain base
    let b = [0,0,0,0,0,0,0];
    for (let i = 0; i < bufSize; i++) {
      const w = Math.random() * 2 - 1;
      b[0] = 0.99886*b[0] + w*0.0555179; b[1] = 0.99332*b[1] + w*0.0750759;
      b[2] = 0.96900*b[2] + w*0.1538520; b[3] = 0.86650*b[3] + w*0.3104856;
      b[4] = 0.55000*b[4] + w*0.5329522; b[5] = -0.7616*b[5] - w*0.0168980;
      data[i] = (b[0]+b[1]+b[2]+b[3]+b[4]+b[5]+b[6]+w*0.5362) * 0.11;
      b[6] = w * 0.115926;
    }
  }
  return buf;
}

function startGenSound(id) {
  const ctx = getAudioCtx();
  const gainNode = ctx.createGain();
  gainNode.gain.setValueAtTime(0, ctx.currentTime);
  gainNode.gain.linearRampToValueAtTime(genVolume, ctx.currentTime + 0.5);
  gainNode.connect(ctx.destination);

  let nodes = [gainNode];

  if (id === 'rain') {
    // Pink noise + low pass filter for rain
    const buf = makeNoiseBuffer(ctx, 'pink');
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 1200;
    src.connect(filter); filter.connect(gainNode);
    src.start();
    nodes.push(src, filter);

    // Add occasional drip
    const drip = ctx.createOscillator();
    const dripGain = ctx.createGain();
    drip.frequency.value = 800; drip.type = 'sine';
    dripGain.gain.value = 0;
    drip.connect(dripGain); dripGain.connect(gainNode);
    drip.start();
    nodes.push(drip, dripGain);

    let dripInterval = setInterval(() => {
      if (!genNodes[id]) { clearInterval(dripInterval); return; }
      const t = ctx.currentTime;
      dripGain.gain.cancelScheduledValues(t);
      dripGain.gain.setValueAtTime(0, t);
      dripGain.gain.linearRampToValueAtTime(0.05, t + 0.01);
      dripGain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      drip.frequency.setValueAtTime(600 + Math.random()*400, t);
    }, 800 + Math.random()*1200);
    nodes.push({ stop: () => clearInterval(dripInterval) });

  } else if (id === 'white') {
    const buf = makeNoiseBuffer(ctx, 'white');
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    src.connect(gainNode); src.start();
    nodes.push(src);

  } else if (id === 'brown') {
    const buf = makeNoiseBuffer(ctx, 'brown');
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const f = ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 500;
    src.connect(f); f.connect(gainNode);
    src.start();
    nodes.push(src, f);

  } else if (id === 'forest') {
    // Base ambient + bird chirps
    const buf = makeNoiseBuffer(ctx, 'pink');
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 600; f.Q.value = 0.5;
    src.connect(f); f.connect(gainNode);
    src.start();
    nodes.push(src, f);

    // Bird chirp oscillator
    const bird = ctx.createOscillator();
    const birdGain = ctx.createGain();
    bird.type = 'sine'; bird.frequency.value = 2000;
    birdGain.gain.value = 0;
    bird.connect(birdGain); birdGain.connect(gainNode);
    bird.start();
    nodes.push(bird, birdGain);

    let birdInterval = setInterval(() => {
      if (!genNodes[id]) { clearInterval(birdInterval); return; }
      const t = ctx.currentTime;
      const baseFreq = 1800 + Math.random() * 800;
      bird.frequency.setValueAtTime(baseFreq, t);
      bird.frequency.linearRampToValueAtTime(baseFreq + 200, t + 0.08);
      bird.frequency.linearRampToValueAtTime(baseFreq, t + 0.16);
      birdGain.gain.cancelScheduledValues(t);
      birdGain.gain.setValueAtTime(0, t);
      birdGain.gain.linearRampToValueAtTime(0.06, t + 0.04);
      birdGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    }, 1500 + Math.random() * 2500);
    nodes.push({ stop: () => clearInterval(birdInterval) });

  } else if (id === 'cafe') {
    // Warm brown noise + subtle chatter
    const buf = makeNoiseBuffer(ctx, 'brown');
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const f = ctx.createBiquadFilter();
    f.type = 'peaking'; f.frequency.value = 300; f.gain.value = 6;
    src.connect(f); f.connect(gainNode);
    src.start();
    nodes.push(src, f);

    // Cup clink sound
    const clink = ctx.createOscillator();
    const clinkGain = ctx.createGain();
    clink.type = 'triangle'; clink.frequency.value = 1200;
    clinkGain.gain.value = 0;
    clink.connect(clinkGain); clinkGain.connect(gainNode);
    clink.start();
    nodes.push(clink, clinkGain);

    let clinkInterval = setInterval(() => {
      if (!genNodes[id]) { clearInterval(clinkInterval); return; }
      const t = ctx.currentTime;
      clinkGain.gain.cancelScheduledValues(t);
      clinkGain.gain.setValueAtTime(0, t);
      clinkGain.gain.linearRampToValueAtTime(0.04, t + 0.005);
      clinkGain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    }, 3000 + Math.random() * 5000);
    nodes.push({ stop: () => clearInterval(clinkInterval) });

  } else if (id === 'space') {
    // Deep drone with slow LFO — routed through shared gainNode
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    osc1.type = 'sine'; osc1.frequency.value = 55;
    osc2.type = 'sine'; osc2.frequency.value = 58;
    osc1.connect(gainNode); osc2.connect(gainNode);

    const lfo = ctx.createOscillator();
    const lfoAmp = ctx.createGain();
    lfo.frequency.value = 0.1; lfoAmp.gain.value = 20;
    lfo.connect(lfoAmp); lfoAmp.connect(osc1.frequency);
    lfo.start(); osc1.start(); osc2.start();
    nodes.push(osc1, osc2, lfo, lfoAmp);
  }

  genNodes[id] = { nodes, gainNode };
  updateGenVolume();
}

function stopGenSound(id) {
  const n = genNodes[id];
  if (!n) return;
  const ctx = getAudioCtx();
  try {
    n.gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
    setTimeout(() => {
      n.nodes.forEach(node => {
        if (node && node.stop) node.stop();
        if (node && node.disconnect) node.disconnect();
      });
    }, 600);
  } catch(e) {}
  delete genNodes[id];
}

function toggleGenSound(id) {
  if (genNodes[id]) {
    stopGenSound(id);
  } else {
    startGenSound(id);
  }
  renderMusicTracks();
}

function updateGenVolume() {
  const ctx = getAudioCtx();
  Object.values(genNodes).forEach(n => {
    if (n.gainNode && n.gainNode.gain) {
      n.gainNode.gain.cancelScheduledValues(ctx.currentTime);
      n.gainNode.gain.setTargetAtTime(genVolume, ctx.currentTime, 0.05);
    }
  });
}

function setGenVolume(val) {
  genVolume = parseInt(val) / 100;
  document.getElementById('vol-label').textContent = val + '%';
  updateGenVolume();
}

function setMusicTab(tab) {
  currentMusicTab = tab;
  document.querySelectorAll('.music-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('mtab-' + tab).classList.add('active');
  document.getElementById('music-panel-gen').style.display = tab === 'gen' ? 'block' : 'none';
  document.getElementById('music-panel-radio').style.display = tab === 'radio' ? 'block' : 'none';
}

function renderMusicTracks() {
  const wrap = document.getElementById('music-tracks');
  if (!wrap) return;
  wrap.innerHTML = GEN_SOUNDS.map(t => {
    const active = !!genNodes[t.id];
    return `
    <div class="music-track ${active ? 'playing' : ''}" onclick="toggleGenSound('${t.id}')">
      <span class="music-track-icon">${t.icon}</span>
      <span class="music-track-name">${t.name}</span>
      ${active ? '<span class="music-playing-dot"></span>' : ''}
    </div>`;
  }).join('');

  const radioWrap = document.getElementById('radio-tracks');
  if (radioWrap) {
    radioWrap.innerHTML = RADIO_LINKS.map(r => `
      <a class="music-radio-link" href="${r.url}" target="_blank" rel="noopener">
        <span class="music-track-icon">${r.icon}</span>
        <span class="music-track-name">${r.name}</span>
        <span style="font-size:0.65rem;color:var(--text3)">↗</span>
      </a>`).join('');
  }
}


function toggleTimerMinimize(e) {
  if (e) e.stopPropagation();
  timerMinimized = !timerMinimized;
  const w = document.getElementById('timer-widget');
  w.classList.toggle('minimized', timerMinimized);
  if (timerMinimized) {
    w.onclick = () => { timerMinimized = false; w.classList.remove('minimized'); w.onclick = null; };
  } else {
    w.onclick = null;
  }
}

function setTimerMode(mode) {
  timerMode = mode;
  // Update tabs
  document.querySelectorAll('.timer-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + mode).classList.add('active');

  // Show/hide elements
  document.getElementById('pomo-info').style.display = mode === 'pomodoro' ? 'flex' : 'none';
  document.getElementById('manual-inputs').style.display = mode === 'manual' ? 'flex' : 'none';

  resetTimer();
}

function toggleTimer() {
  if (timerRunning) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  if (timerMode === 'stopwatch') {
    timerRunning = true;
    document.getElementById('timer-play-btn').textContent = '⏸ Pausar';
    document.getElementById('timer-label').textContent = 'contando...';
    document.getElementById('timer-digits').className = 'timer-digits running';
    timerInterval = setInterval(() => {
      timerSecondsElapsed++;
      updateStopwatchDisplay();
    }, 1000);
    return;
  }

  if (timerMode === 'manual') {
    const m = parseInt(document.getElementById('manual-min').value) || 0;
    const s = parseInt(document.getElementById('manual-sec').value) || 0;
    timerTotalSeconds = m * 60 + s;
    timerSecondsLeft = timerTotalSeconds;
  }

  if (timerSecondsLeft <= 0) return;
  requestNotifPermission();

  timerRunning = true;
  document.getElementById('timer-play-btn').textContent = '⏸ Pausar';
  document.getElementById('timer-label').textContent = pomoPhase === 'break' || pomoPhase === 'longbreak' ? 'descanso' : 'estudiando';
  document.getElementById('timer-digits').className = 'timer-digits running';

  timerInterval = setInterval(() => {
    timerSecondsLeft--;
    updateTimerDisplay();
    if (timerSecondsLeft <= 0) {
      onTimerComplete();
    }
  }, 1000);
}

function pauseTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('timer-play-btn').textContent = '▶ Continuar';
  document.getElementById('timer-label').textContent = 'pausado';
  document.getElementById('timer-digits').className = 'timer-digits';
}

function resetTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  timerSecondsElapsed = 0;

  if (timerMode === 'pomodoro') {
    pomoSession = 1;
    pomoPhase = 'work';
    timerTotalSeconds = POMO_WORK;
    timerSecondsLeft = POMO_WORK;
    updatePomoInfo();
  } else if (timerMode === 'manual') {
    const m = parseInt(document.getElementById('manual-min').value) || 25;
    const s = parseInt(document.getElementById('manual-sec').value) || 0;
    timerTotalSeconds = m * 60 + s;
    timerSecondsLeft = timerTotalSeconds;
  } else {
    timerSecondsLeft = 0;
    timerSecondsElapsed = 0;
  }

  document.getElementById('timer-play-btn').textContent = '▶ Iniciar';
  document.getElementById('timer-label').textContent = 'listo';
  document.getElementById('timer-digits').className = 'timer-digits';
  updateTimerDisplay();
  updateRing(0);
}

function onManualInput() {
  if (!timerRunning) {
    const m = parseInt(document.getElementById('manual-min').value) || 0;
    const s = parseInt(document.getElementById('manual-sec').value) || 0;
    timerTotalSeconds = m * 60 + s;
    timerSecondsLeft = timerTotalSeconds;
    updateTimerDisplay();
    updateRing(0);
  }
}

function updateTimerDisplay() {
  const m = Math.floor(timerSecondsLeft / 60);
  const s = timerSecondsLeft % 60;
  document.getElementById('timer-digits').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  // Ring progress
  const progress = timerTotalSeconds > 0 ? 1 - (timerSecondsLeft / timerTotalSeconds) : 0;
  updateRing(progress);

  // Warning color
  if (timerSecondsLeft <= 60 && timerRunning) {
    document.getElementById('timer-digits').className = 'timer-digits warning';
    document.getElementById('timer-ring').style.stroke = '#f87171';
  } else if (pomoPhase === 'break' || pomoPhase === 'longbreak') {
    document.getElementById('timer-ring').style.stroke = 'var(--green)';
    document.getElementById('timer-digits').className = 'timer-digits break';
  } else {
    document.getElementById('timer-ring').style.stroke = 'var(--accent)';
  }
}

function updateStopwatchDisplay() {
  const m = Math.floor(timerSecondsElapsed / 60);
  const s = timerSecondsElapsed % 60;
  document.getElementById('timer-digits').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  // Ring: full loop every 25 minutes
  const progress = (timerSecondsElapsed % (25*60)) / (25*60);
  updateRing(progress);
}

function updateRing(progress) {
  const offset = RING_CIRCUMFERENCE * (1 - progress);
  document.getElementById('timer-ring').style.strokeDashoffset = offset;
}

function onTimerComplete() {
  timerRunning = false;
  clearInterval(timerInterval);
  playAlarm();

  if (timerMode === 'pomodoro') {
    if (pomoPhase === 'work') {
      if (pomoSession >= POMO_CYCLES) {
        pomoPhase = 'longbreak';
        timerTotalSeconds = POMO_LONGBREAK;
        timerSecondsLeft = POMO_LONGBREAK;
        document.getElementById('timer-label').textContent = '¡Descanso largo!';
        showTimerNotif('🎉 ¡4 sesiones completadas! Tómate 15 min de descanso.');
      } else {
        pomoPhase = 'break';
        timerTotalSeconds = POMO_BREAK;
        timerSecondsLeft = POMO_BREAK;
        document.getElementById('timer-label').textContent = '¡Descansa 5 min!';
        showTimerNotif('✅ ¡Sesión completada! Descansa 5 minutos.');
      }
    } else {
      // Break finished
      if (pomoPhase === 'longbreak') pomoSession = 1;
      else pomoSession++;
      pomoPhase = 'work';
      timerTotalSeconds = POMO_WORK;
      timerSecondsLeft = POMO_WORK;
      document.getElementById('timer-label').textContent = '¡A estudiar!';
      showTimerNotif('⏱ ¡A estudiar! Sesión ' + pomoSession + ' de ' + POMO_CYCLES);
    }
    updatePomoInfo();
    document.getElementById('timer-digits').className = 'timer-digits';
    document.getElementById('timer-play-btn').textContent = '▶ Iniciar';
    updateTimerDisplay();
  } else {
    timerSecondsLeft = 0;
    document.getElementById('timer-digits').textContent = '00:00';
    document.getElementById('timer-label').textContent = '¡Completado!';
    document.getElementById('timer-play-btn').textContent = '▶ Iniciar';
    updateRing(1);
    showTimerNotif('✅ ¡Tiempo completado!');
  }
}

function updatePomoInfo() {
  // Dots
  const dots = Array.from({length: POMO_CYCLES}, (_, i) => {
    let cls = '';
    if (i < pomoSession - 1) cls = 'done';
    else if (i === pomoSession - 1 && pomoPhase === 'work') cls = 'active';
    return `<span class="pomo-dot ${cls}"></span>`;
  }).join('');
  document.getElementById('pomo-dots').innerHTML = dots;

  // Phase label
  let label = '';
  if (pomoPhase === 'work') label = `Sesión ${pomoSession} de ${POMO_CYCLES}`;
  else if (pomoPhase === 'break') label = `Descanso corto`;
  else label = `Descanso largo`;
  document.getElementById('pomo-phase-label').textContent = label;
}

function playAlarm() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.4);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.4);
    });
  } catch(e) {}
}

function showTimerNotif(msg) {
  // Try browser notification
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('Portal de Estudio', { body: msg, icon: '' });
  }
  // Also show in-app
  const label = document.getElementById('timer-label');
  if (label) label.textContent = msg.replace(/^[^ ]+ /, '');
}

// Request notification permission on first timer start
function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
async function init() {
  // Show loading
  document.getElementById('content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:1rem">
      <div style="font-size:2rem;animation:pulse 1s infinite">☁️</div>
      <div style="font-family:'Geist Mono',monospace;font-size:0.7rem;color:var(--text3)">Cargando desde la nube...</div>
    </div>`;
  await load();
  renderSidebar();
  renderHome();
  updateBreadcrumb();
  updateTopbarButtons();
  updateStorage();
  updatePomoInfo();
  updateTimerDisplay();
  renderMusicTracks();
}
init();
</script>
